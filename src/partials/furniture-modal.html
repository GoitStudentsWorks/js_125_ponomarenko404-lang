<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <!-- CLOSE -->
    <button class="modal-close" type="button">✕</button>

    <div class="modal-inner">
      <!-- LEFT: GALLERY -->
      <div class="modal-gallery">
        <img class="modal-main-image" src="#" alt="Furniture image" />

        <div class="modal-thumbnails"></div>
      </div>

      <!-- RIGHT: INFO -->
      <div class="modal-info">
        <h2 class="modal-title" aria-label="Назва товару"></h2>

        <p class="modal-category"></p>

        <p class="modal-price"></p>

        <div class="modal-rating"></div>

        <div class="modal-colors">
          <p class="color-text"></p>
          <div class="color-options"></div>
        </div>

        <p class="modal-description"></p>

        <p class="modal-size"></p>

        <button class="modal-order-btn btn-red" type="button">
          Перейти до замовлення
        </button>
      </div>
    </div>
  </div>
</div>
